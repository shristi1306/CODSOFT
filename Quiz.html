<!DOCTYPE html>
<html>
<head>
<title>Quiz Demo</title>
<link rel="stylesheet" href="/Quiz.Css">
</head>
<body>

<div class="quiz-container">

<div class="progress">Question 1/3</div>

<h2 id="question">
Have you practiced sport or any physical activity at least 30 min in the last month?
</h2>

<div class="options">
<button onclick="selectOption(this)">3 times or more per week</button>
<button onclick="selectOption(this)">1 or 2 times per week</button>
<button onclick="selectOption(this)">Less than 4 times per month</button>
<button onclick="selectOption(this)">I don't practice sport during the month</button>
</div>

<button class="next" onclick="nextQuestion()">Next</button>

</div>

<script src="script.js"></script>
</body>
</html>
